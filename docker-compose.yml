version: '3.8'

services:
  liteparse-worker:
    build: .
    container_name: liteparse-worker
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Optional: Mount logs directory
      - ./logs:/app/logs
    # Optional: Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    networks:
      - apastar
networks:
  apastar:
    name: apastar
    external: true
